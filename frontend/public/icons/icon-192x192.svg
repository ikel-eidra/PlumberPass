<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00b8a9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="24" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="url(#accent)" stroke-width="6"/>
  
  <!-- Inner diamond/plumber symbol -->
  <path d="M96 40 L140 96 L96 152 L52 96 Z" fill="url(#accent)" opacity="0.9"/>
  
  <!-- Center dot -->
  <circle cx="96" cy="96" r="20" fill="#000"/>
  <circle cx="96" cy="96" r="12" fill="url(#accent)"/>
  
  <!-- Glow effect -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="72;76;72" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
