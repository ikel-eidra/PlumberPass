<!DOCTYPE html>
<html>
<head>
  <title>Generate PWA Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
    canvas { border: 1px solid #333; margin: 10px; }
    .icon-preview { display: inline-block; text-align: center; margin: 10px; }
    button { padding: 10px 20px; margin: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>PlumberPass Icon Generator</h1>
  <p>Open this file in a browser and click "Generate Icons" to create PNG versions.</p>
  
  <button onclick="generateIcons()">Generate Icons</button>
  <button onclick="downloadAll()">Download All</button>
  
  <div id="previews"></div>
  
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    const generated = {};

    function drawIcon(size) {
      const canvas = document.getElementById('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      // Background (dark)
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, size, size);
      
      // Rounded corners
      ctx.globalCompositeOperation = 'destination-in';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.125);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      
      // Center coordinates
      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.375;
      
      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#00d4ff';
      ctx.lineWidth = size * 0.03125;
      ctx.stroke();
      
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.778);
      ctx.lineTo(cx + r * 0.611, cy);
      ctx.lineTo(cx, cy + r * 0.778);
      ctx.lineTo(cx - r * 0.611, cy);
      ctx.closePath();
      ctx.fillStyle = '#00d4ff';
      ctx.fill();
      
      // Center circle (cutout)
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.167, 0, Math.PI * 2);
      ctx.fillStyle = '#000000';
      ctx.fill();
      
      // Inner dot
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.1, 0, Math.PI * 2);
      ctx.fillStyle = '#00d4ff';
      ctx.fill();
      
      return canvas.toDataURL('image/png');
    }

    function generateIcons() {
      const previews = document.getElementById('previews');
      previews.innerHTML = '';
      
      sizes.forEach(size => {
        const dataUrl = drawIcon(size);
        generated[size] = dataUrl;
        
        const div = document.createElement('div');
        div.className = 'icon-preview';
        div.innerHTML = `
          <img src="${dataUrl}" width="${size > 192 ? 192 : size}" height="${size > 192 ? 192 : size}">
          <p>${size}x${size}</p>
        `;
        previews.appendChild(div);
      });
    }

    function downloadAll() {
      Object.entries(generated).forEach(([size, dataUrl]) => {
        const link = document.createElement('a');
        link.download = `icon-${size}x${size}.png`;
        link.href = dataUrl;
        link.click();
      });
    }
  </script>
</body>
</html>
