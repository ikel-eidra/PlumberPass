services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plumberpass-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - backend-cache:/app/.cache
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PREMIUM_UNIT_AMOUNT=${STRIPE_PREMIUM_UNIT_AMOUNT:-0}
      - STRIPE_PREMIUM_CURRENCY=${STRIPE_PREMIUM_CURRENCY:-php}
      - BILLING_FRONTEND_URL=${BILLING_FRONTEND_URL:-https://plumberpass.futoltech.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Static files served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plumberpass-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Redis for caching (optional, for future scaling)
  redis:
    image: redis:7-alpine
    container_name: plumberpass-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - with-redis

volumes:
  backend-cache:
  redis-data:

networks:
  default:
    name: plumberpass-network
